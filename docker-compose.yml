  antifraud:
    build:
      context: ./services/antifraud
    container_name: neomarket-antifraud
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: antifraud_service.settings
      SECRET_KEY: antifraud-dev-secret
      DEBUG: '1'
      DB_NAME: antifraud_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      OTEL_ENABLED: 'true'
      JAEGER_ENABLED: 'true'
      JAEGER_HOST: jaeger:6831
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: DEBUG
    volumes:
    - ./services/antifraud:/app
    - ./infra:/app/infra:ro
    ports:
    - 8011:8000
    depends_on:
