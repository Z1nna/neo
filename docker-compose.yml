    environment:
      DJANGO_SETTINGS_MODULE: promo_service.settings
      SECRET_KEY: promo-dev-secret
      DEBUG: '1'
      DB_NAME: promo_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      OTEL_ENABLED: 'true'
      JAEGER_ENABLED: 'true'
      JAEGER_HOST: jaeger:6831
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: DEBUG
    volumes:
    - ./services/promo:/app
    - ./infra:/app/infra:ro
    ports:
    - 8010:8000
    depends_on:
