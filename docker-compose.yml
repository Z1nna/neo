      context: ./services/catalog
    container_name: neomarket-catalog-projection
    command: python manage.py consume_domain_events
    environment:
      DJANGO_SETTINGS_MODULE: catalog_service.settings
      SECRET_KEY: catalog-dev-secret
      DEBUG: '1'
      DB_NAME: catalog_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      EVENT_STREAM: neomarket.events
      EVENT_GROUP: catalog
      EVENT_CONSUMER: catalog-projection
    volumes:
    - ./services/catalog:/app
    - ./infra:/app/infra:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  orders-consumer:
    build:
      context: ./services/orders
    container_name: neomarket-orders-consumer
    command: python manage.py consume_domain_events
    environment:
      DJANGO_SETTINGS_MODULE: orders_service.settings
      SECRET_KEY: orders-dev-secret
      DEBUG: '1'
      DB_NAME: orders_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      EVENT_STREAM: neomarket.events
      EVENT_GROUP: orders
      EVENT_CONSUMER: orders-consumer
    volumes:
    - ./services/orders:/app
    - ./infra:/app/infra:ro
