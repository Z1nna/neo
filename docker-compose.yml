      sleep 2; done"
    environment:
      DJANGO_SETTINGS_MODULE: moderation_service.settings
      SECRET_KEY: moderation-dev-secret
      DEBUG: '1'
      DB_NAME: moderation_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      MODERATION_EVENTS_STREAM: neomarket.events
      OTEL_ENABLED: 'true'
      JAEGER_ENABLED: 'true'
      JAEGER_HOST: jaeger:6831
