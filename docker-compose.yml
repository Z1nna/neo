        condition: service_healthy
      redis:
        condition: service_healthy
  orders-outbox:
    build:
      context: ./services/orders
    container_name: neomarket-orders-outbox
    command: sh -c "while true; do python manage.py publish_outbox_events;
      sleep 2; done"
    environment:
      DJANGO_SETTINGS_MODULE: orders_service.settings
      SECRET_KEY: orders-dev-secret
      DEBUG: '1'
      DB_NAME: orders_db
      DB_USER: neomarket
      DB_PASSWORD: neomarket
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      EVENT_STREAM: neomarket.events
      OTEL_ENABLED: 'true'
      JAEGER_ENABLED: 'true'
      JAEGER_HOST: jaeger:6831
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: DEBUG
    volumes:
    - ./services/orders:/app
    - ./infra:/app/infra:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  api_gateway:
    build:
      context: ./
      dockerfile: ./infra/Dockerfile.gateway
    container_name: neomarket-api-gateway
    ports:
    - 8888:80
    volumes:
    - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      NGINX_HOST: api.neomarket.local
      NGINX_PORT: 80
    depends_on:
    - b2b
    - payments
    - logistics
    - reviews
    - promo
    - catalog
    - moderation
    - orders
    - cart
    - auth
    - antifraud
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://localhost/health
      interval: 10s
      timeout: 5s
      retries: 5
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: neomarket-jaeger
    ports:
    - 6831:6831/udp
    - 16686:16686
    - 4317:4317
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:14269/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus:latest
    container_name: neomarket-prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    ports:
    - 9090:9090
    volumes:
    - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - prometheus_data:/prometheus
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9090/-/healthy
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
    - jaeger
  grafana:
    image: grafana/grafana:latest
    container_name: neomarket-grafana
    ports:
    - 3000:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
    - grafana_data:/var/lib/grafana
    - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
    - prometheus
  loki:
    image: grafana/loki:latest
    container_name: neomarket-loki
    ports:
    - 3100:3100
    volumes:
    - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3100/ready || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  b2b-cabinet:
    build:
      context: ./frontend/apps/b2b-cabinet
    container_name: neomarket-b2b-cabinet
    ports:
    - 5176:80
    depends_on:
    - api_gateway
    - b2b
    - auth
    - catalog
    environment:
      VITE_API_URL: http://localhost:8888/api/v1
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://localhost/
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: ./frontend
    container_name: neomarket-frontend
    ports:
    - 8080:80
    depends_on:
    - catalog
    - cart
    - orders
    - moderation
    - moderation-worker
    - b2b
    - auth
    - payments
    - logistics
    - reviews
