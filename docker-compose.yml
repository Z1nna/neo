  b2b-outbox:
    build:
      context: ./services/b2b
    container_name: neomarket-b2b-outbox
    command: sh -c "while true; do python manage.py publish_outbox_events;
      sleep 2; done"
    environment:
      DJANGO_SETTINGS_MODULE: b2b_service.settings
      SECRET_KEY: b2b-dev-secret
      DEBUG: '1'
      DB_NAME: b2b_db
      DB_USER: neomarket
