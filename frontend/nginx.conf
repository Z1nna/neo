server {
    listen 80;
    server_name _;
    charset utf-8;
    source_charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/catalog/ {
        rewrite ^/api/v1/catalog/(.*) /api/v1/$1 break;
        proxy_pass http://catalog:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payments/ {
        proxy_pass http://payments:8000/;
        proxy_set_header Host $host;
    }

    location /api/logistics/ {
        proxy_pass http://logistics:8000/;
        proxy_set_header Host $host;
    }

    location /api/reviews/ {
        proxy_pass http://reviews:8000/;
        proxy_set_header Host $host;
    }

    location /api/promo/ {
        proxy_pass http://promo:8000/;
        proxy_set_header Host $host;
    }

    location /api/antifraud/ {
        proxy_pass http://antifraud:8000/;
        proxy_set_header Host $host;
    }
}
