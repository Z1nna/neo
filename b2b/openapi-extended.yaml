          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              status:
                type: string
              created_at:
                type: string
                format: date-time
        top_products:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              product_id:
                type: string
              title:
                type: string
              units_sold:
