    DashboardStats:
      type: object
      properties:
        day_revenue:
          type: integer
        week_revenue:
          type: integer
        month_revenue:
          type: integer
        conversion_rate:
          type: number
        traffic_today:
          type: integer
        new_reviews:
          type: integer
        pending_items_in_moderation:
          type: integer
