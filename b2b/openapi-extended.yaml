              description: За месяц (копейки)
            total_orders:
              type: integer
              description: За месяц
            total_products:
              type: integer
            active_products:
              type: integer
            pending_orders:
              type: integer
            average_rating:
              type: number
              format: float
        recent_orders:
          type: array
