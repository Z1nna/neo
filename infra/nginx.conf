upstream b2b_backend {
    least_conn;
    server b2b:8000 max_fails=3 fail_timeout=30s;
}

upstream payments_backend {
    least_conn;
    server payments:8000 max_fails=3 fail_timeout=30s;
}

upstream logistics_backend {
    least_conn;
    server logistics:8000 max_fails=3 fail_timeout=30s;
}

upstream reviews_backend {
    least_conn;
    server reviews:8000 max_fails=3 fail_timeout=30s;
}

upstream promo_backend {
    least_conn;
    server promo:8000 max_fails=3 fail_timeout=30s;
}

upstream catalog_backend {
    least_conn;
    server catalog:8000 max_fails=3 fail_timeout=30s;
}

upstream moderation_backend {
    least_conn;
    server moderation:8000 max_fails=3 fail_timeout=30s;
}

upstream orders_backend {
    least_conn;
    server orders:8000 max_fails=3 fail_timeout=30s;
}

upstream cart_backend {
    least_conn;
    server cart:8000 max_fails=3 fail_timeout=30s;
}

upstream auth_backend {
    least_conn;
    server auth:8000 max_fails=3 fail_timeout=30s;
}

upstream antifraud_backend {
    least_conn;
    server antifraud:8000 max_fails=3 fail_timeout=30s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ip_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ip_strict:10m rate=2r/s;
limit_req_zone $http_x_user_id zone=user_general:10m rate=100r/s;
limit_req_zone $http_x_seller_id zone=seller_general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=20r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=connection_limit:10m;

# Access logging with request/response times
log_format detailed '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log warn;

    # Resolver for dynamic service discovery
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ==================== HEALTH CHECKS ====================
    location /health {
        access_log off;
        return 200 "gateway_healthy\n";
        add_header Content-Type text/plain;
    }

    # ==================== ADMIN ENDPOINTS ====================
    location /admin {
        limit_req zone=ip_strict burst=5 nodelay;
        limit_conn connection_limit 2;
        return 403;
    }

    # ==================== AUTH SERVICE ====================
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_conn connection_limit 10;

        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ==================== B2B SERVICE (Seller Cabinet) ====================
    location /api/v1/b2b/ {
        limit_req zone=seller_general burst=50 nodelay;
        limit_conn connection_limit 20;

        # Require seller authentication
        if ($http_authorization ~* "^$") {
            return 401 "Missing authorization header";
        }

        rewrite ^/api/v1/b2b/(.*) /api/v1/$1 break;
        proxy_pass http://b2b_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ==================== PAYMENTS SERVICE ====================
    location /api/v1/payments/ {
        limit_req zone=payment_limit burst=30 nodelay;
        limit_conn connection_limit 15;

        # Require authentication
        if ($http_authorization ~* "^$") {
            return 401 "Missing authorization header";
        }

        rewrite ^/api/v1/payments/(.*) /api/v1/$1 break;
        proxy_pass http://payments_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
    }

    # ==================== ORDERS SERVICE ====================
    location /api/v1/orders/ {
        limit_req zone=user_general burst=50 nodelay;
        limit_conn connection_limit 20;

        rewrite ^/api/v1/orders/(.*) /api/v1/$1 break;
        proxy_pass http://orders_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-User-ID $http_x_user_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ==================== CART SERVICE ====================
    location /api/v1/cart/ {
        limit_req zone=user_general burst=100 nodelay;
        limit_conn connection_limit 25;

        rewrite ^/api/v1/cart/(.*) /api/v1/$1 break;
        proxy_pass http://cart_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-User-ID $http_x_user_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ==================== CATALOG SERVICE (Public) ====================
    location /api/v1/catalog/ {
        limit_req zone=ip_general burst=20 nodelay;
        limit_conn connection_limit 50;

        rewrite ^/api/v1/catalog/(.*) /api/v1/$1 break;
        proxy_pass http://catalog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ==================== REVIEWS SERVICE (Public) ====================
    location /api/v1/reviews/ {
        limit_req zone=ip_general burst=20 nodelay;
        limit_conn connection_limit 50;

        rewrite ^/api/v1/reviews/(.*) /api/v1/$1 break;
        proxy_pass http://reviews_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ==================== PROMO SERVICE ====================
    location /api/v1/promo/ {
        limit_req zone=user_general burst=50 nodelay;
        limit_conn connection_limit 20;

        rewrite ^/api/v1/promo/(.*) /api/v1/$1 break;
        proxy_pass http://promo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ==================== LOGISTICS SERVICE ====================
    location /api/v1/logistics/ {
        limit_req zone=user_general burst=30 nodelay;
        limit_conn connection_limit 15;

        rewrite ^/api/v1/logistics/(.*) /api/v1/$1 break;
        proxy_pass http://logistics_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ==================== MODERATION SERVICE ====================
    location /api/v1/moderation/ {
        limit_req zone=ip_strict burst=5 nodelay;
        limit_conn connection_limit 5;

        rewrite ^/api/v1/moderation/(.*) /api/v1/$1 break;
        proxy_pass http://moderation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ==================== ANTIFRAUD SERVICE ====================
    location /api/v1/antifraud/ {
        limit_req zone=payment_limit burst=20 nodelay;
        limit_conn connection_limit 10;

        rewrite ^/api/v1/antifraud/(.*) /api/v1/$1 break;
        proxy_pass http://antifraud_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 8s;
        proxy_read_timeout 8s;
    }

    # ==================== DOCUMENTATION ====================
    location /docs/ {
        limit_req zone=ip_general burst=20 nodelay;
        
        rewrite ^/docs/(.*)$ /api/$1 break;
        proxy_pass http://catalog_backend;
        
        add_header Cache-Control "public, max-age=3600" always;
    }

    # ==================== 404 ====================
    location / {
        return 404 "Not found\n";
        add_header Content-Type text/plain;
    }
}
