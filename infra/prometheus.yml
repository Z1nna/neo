# Prometheus configuration for scraping metrics from all services
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'neomarket-monitoring'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'b2b'
    static_configs:
      - targets: ['b2b:8000', 'b2b-outbox:8000']
    metrics_path: '/metrics'
    
  - job_name: 'payments'
    static_configs:
      - targets: ['payments:8000', 'payments-outbox:8000']
    metrics_path: '/metrics'

  - job_name: 'logistics'
    static_configs:
      - targets: ['logistics:8000']
    metrics_path: '/metrics'

  - job_name: 'reviews'
    static_configs:
      - targets: ['reviews:8000']
    metrics_path: '/metrics'

  - job_name: 'promo'
    static_configs:
      - targets: ['promo:8000']
    metrics_path: '/metrics'

  - job_name: 'catalog'
    static_configs:
      - targets: ['catalog:8000']
    metrics_path: '/metrics'

  - job_name: 'moderation'
    static_configs:
      - targets: ['moderation:8000', 'moderation-worker:8000']
    metrics_path: '/metrics'

  - job_name: 'orders'
    static_configs:
      - targets: ['orders:8000', 'orders-outbox:8000']
    metrics_path: '/metrics'

  - job_name: 'cart'
    static_configs:
      - targets: ['cart:8000']
    metrics_path: '/metrics'

  - job_name: 'auth'
    static_configs:
      - targets: ['auth:8000']
    metrics_path: '/metrics'

  - job_name: 'antifraud'
    static_configs:
      - targets: ['antifraud:8000']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
