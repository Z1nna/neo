# JSON Schema (YAML) для infra/prometheus.yml NeoMarket.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://neomarket.local/schemas/prometheus.neomarket.schema.yaml
title: NeoMarket Prometheus config
type: object
required:
  - scrape_configs
additionalProperties: true
properties:
  global:
    type: object
    additionalProperties: true
    properties:
      scrape_interval: { type: string }
      evaluation_interval: { type: string }
      external_labels:
        type: object
        additionalProperties: { type: string }
  scrape_configs:
    type: array
    minItems: 1
    items:
      type: object
      required: [job_name, static_configs]
      additionalProperties: true
      properties:
        job_name: { type: string, minLength: 1 }
        metrics_path: { type: string, pattern: "^/" }
        scheme: { enum: [http, https] }
        static_configs:
          type: array
          minItems: 1
          items:
            type: object
            required: [targets]
            additionalProperties: true
            properties:
              targets:
                type: array
                minItems: 1
                items:
                  type: string
                  pattern: "^[A-Za-z0-9_.-]+:[0-9]+$"
