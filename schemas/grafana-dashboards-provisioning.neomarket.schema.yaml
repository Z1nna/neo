# JSON Schema (YAML) для infra/grafana/provisioning/dashboards/dashboards.yaml
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://neomarket.local/schemas/grafana-dashboards-provisioning.neomarket.schema.yaml
title: Grafana dashboard provisioning (apiVersion 1)
type: object
required:
  - apiVersion
  - providers
additionalProperties: false
properties:
  apiVersion:
    const: 1
  providers:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, orgId, folder, type, options]
      additionalProperties: true
      properties:
        name: { type: string, minLength: 1 }
        orgId: { type: integer, minimum: 1 }
        folder: { type: string }
        type:
          const: file
        disableDeletion: { type: boolean }
        updateIntervalSeconds: { type: integer, minimum: 1 }
        allowUiUpdates: { type: boolean }
        options:
          type: object
          required: [path]
          additionalProperties: true
          properties:
            path: { type: string, minLength: 1 }
