# JSON Schema (YAML) для docker-compose.yml NeoMarket.
# $schema: draft 2020-12
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://neomarket.local/schemas/docker-compose.neomarket.schema.yaml
title: NeoMarket Docker Compose (services + named volumes)
description: >
  Описывает структуру compose-файла репозитория: корневые ключи services и volumes,
  типовые поля сервисов (image/build, ports, environment, depends_on, healthcheck).
type: object
required:
  - services
additionalProperties: true
properties:
  services:
    type: object
    minProperties: 1
    additionalProperties:
      $ref: "#/$defs/service"
  volumes:
    type: object
    additionalProperties:
      oneOf:
        - type: "null"
        - type: object
          additionalProperties: true
        - type: string
  networks:
    type: object
    additionalProperties: true
  configs:
    type: object
    additionalProperties: true
  secrets:
    type: object
    additionalProperties: true

$defs:
  stringOrNumber:
    oneOf:
      - type: string
      - type: number
      - type: integer

  portMapping:
    oneOf:
      - type: string
        pattern: "^[0-9]+:[0-9]+(/(tcp|udp))?$"
      - type: object
        required: [target]
        properties:
          target: { type: integer }
          published: { type: integer }
          protocol: { enum: [tcp, udp] }
        additionalProperties: true

  healthcheck:
    type: object
    required: [test]
    properties:
      test:
        oneOf:
          - type: string
          - type: array
            minItems: 1
            items: { type: string }
      interval: { type: string }
      timeout: { type: string }
      retries: { type: integer, minimum: 0 }
      start_period: { type: string }
    additionalProperties: true

  dependsOnEntry:
    oneOf:
      - type: string
      - type: object
        required: [condition]
        properties:
          condition:
            enum: [service_started, service_healthy, service_completed_successfully]
        additionalProperties: false

  buildSpec:
    type: object
    required: [context]
    properties:
      context: { type: string }
      dockerfile: { type: string }
      args:
        type: object
        additionalProperties: true
    additionalProperties: true

  service:
    type: object
    description: Один сервис Compose; image XOR build допускается на уровне инстанса.
    properties:
      image: { type: string }
      build:
        oneOf:
          - type: string
          - $ref: "#/$defs/buildSpec"
      container_name: { type: string }
      command:
        oneOf:
          - type: string
          - type: array
            items: { type: string }
      entrypoint:
        oneOf:
          - type: string
          - type: array
            items: { type: string }
      environment:
        oneOf:
          - type: object
            additionalProperties:
              oneOf:
                - type: string
                - type: number
                - type: boolean
                - type: "null"
          - type: array
            items:
              type: string
              pattern: "^[A-Za-z_][A-Za-z0-9_]*=.*$"
      env_file:
        oneOf:
          - type: string
          - type: array
            items: { type: string }
      ports:
        type: array
        items: { $ref: "#/$defs/portMapping" }
      expose:
        type: array
        items: { $ref: "#/$defs/stringOrNumber" }
      volumes:
        type: array
        items:
          type: string
      working_dir: { type: string }
      user: { type: string }
      restart: { type: string }
      depends_on:
        oneOf:
          - type: array
            items: { type: string }
          - type: object
            additionalProperties: { $ref: "#/$defs/dependsOnEntry" }
      healthcheck: { $ref: "#/$defs/healthcheck" }
      networks:
        oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: { type: string }
    additionalProperties: true
    allOf:
      - anyOf:
          - required: [image]
          - required: [build]
