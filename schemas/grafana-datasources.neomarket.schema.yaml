# JSON Schema (YAML) для infra/grafana/provisioning/datasources/datasources.yaml
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://neomarket.local/schemas/grafana-datasources.neomarket.schema.yaml
title: Grafana datasource provisioning (apiVersion 1)
type: object
required:
  - apiVersion
  - datasources
additionalProperties: false
properties:
  apiVersion:
    const: 1
  datasources:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, type, access, url]
      additionalProperties: true
      properties:
        name: { type: string, minLength: 1 }
        type:
          type: string
          minLength: 1
          description: NeoMarket использует prometheus, loki, jaeger; другие типы допустимы при расширении.
        access:
          type: string
          enum: [proxy, direct]
        url: { type: string, minLength: 1 }
        isDefault: { type: boolean }
        editable: { type: boolean }
        jsonData:
          type: object
          additionalProperties: true
        secureJsonData:
          type: object
          additionalProperties: true
