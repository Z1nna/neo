# Упрощённый каркас OpenAPI 3.0.x для контрактов NeoMarket (b2b, b2c/*, moderation).
# Полная спецификация OpenAPI — отдельный стандарт; здесь зафиксированы обязательные корневые узлы.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://neomarket.local/schemas/openapi-3.0-neomarket-root.schema.yaml
title: OpenAPI 3.0.x root (NeoMarket contracts)
type: object
required:
  - openapi
  - info
  - paths
additionalProperties: true
properties:
  openapi:
    type: string
    pattern: "^3\\.0\\.[0-9]+$"
  info:
    type: object
    required: [title, version]
    additionalProperties: true
    properties:
      title: { type: string, minLength: 1 }
      version: { type: string, minLength: 1 }
      description: { type: string }
      contact:
        type: object
        additionalProperties: true
      license:
        type: object
        additionalProperties: true
  jsonSchemaDialect:
    type: string
  servers:
    type: array
    items:
      type: object
      required: [url]
      additionalProperties: true
  security:
    type: array
    items:
      type: object
      minProperties: 1
      additionalProperties:
        type: array
        items: { type: string }
  tags:
    type: array
    items:
      type: object
      required: [name]
      additionalProperties: true
      properties:
        name: { type: string }
        description: { type: string }
  paths:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      minProperties: 1
      additionalProperties: true
  components:
    type: object
    additionalProperties: true
